<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        style-src 'unsafe-inline' {{cspSource}} https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
        font-src {{cspSource}} https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
        img-src {{cspSource}} data:;
        script-src 'unsafe-inline' 'unsafe-eval' {{cspSource}} https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
        connect-src https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
    ">
    <title>Lollms Companion</title>
    <!-- KaTeX Math Typesetting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script {{nonce}} src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script {{nonce}} src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Essential Libraries -->
    <script {{nonce}} src="https://cdn.jsdelivr.net/npm/marked@5.1.1/marked.min.js"></script>
    <script {{nonce}} src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="{{codiconUri}}" rel="stylesheet" />
    <link href="{{cssUri}}" rel="stylesheet" />

    <script {{nonce}} src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script {{nonce}} src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script {{nonce}} src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script {{nonce}} src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script {{nonce}} src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-diff.min.js"></script>

    <style>
        /* ============================================================
           TOKENS — Lollms Companion "Living Circuit" identity
           Two agent colors: violet core (#9b59b6) + magenta pulse (#ff2e88),
           laid over the host VS Code theme so it never fights the editor.
           ============================================================ */
        :root {
            --code-bg: var(--vscode-editor-background);
            --code-header-bg: var(--vscode-keybindingTable-headerBackground);
            --code-border: var(--vscode-widget-border);

            --agent-core: #9b59b6;
            --agent-pulse: #ff2e88;
            --agent-calm: #00d9b5;
            --agent-warm: #ffb454;
            --agent-warm-2: #ff7a59;
            --user-accent: var(--vscode-charts-blue, #3b82f6);

            --success-fg: var(--vscode-charts-green);
            --error-fg: var(--vscode-charts-red);

            --bubble-radius: 16px;
            --shadow-soft: 0 3px 14px rgba(0, 0, 0, 0.28);
            --shadow-lift: 0 6px 22px rgba(0, 0, 0, 0.34);

            /* Bond state — JS tunes these two as the Symbiosis score moves,
               so the avatar's heartbeat literally speeds up and warms in
               color as the friendship with the user deepens. */
            --heartbeat-speed: 2.2s;
            --bond-color: var(--agent-core);
        }

        * { box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: var(--vscode-font-family);
            background-color: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--agent-core), var(--agent-pulse));
            border-radius: 8px;
            opacity: 0.5;
        }

        /* --- COMPANION COMPACT SPACE SAVING OVERRIDES --- */
        .markdown-body {
            font-size: 12.5px !important;
            line-height: 1.5 !important;
        }

        .markdown-body p, .markdown-body ul, .markdown-body ol {
            margin-top: 0 !important;
            margin-bottom: 6px !important;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-size: 13px !important;
            margin-top: 10px !important;
            margin-bottom: 6px !important;
        }

        .processing-block { margin: 6px 0 !important; }
        .processing-header { padding: 6px 8px !important; font-size: 10px !important; }
        .processing-body { padding: 8px !important; font-size: 10px !important; max-height: 120px !important; }

        /* ============================================================
           AGENT AVATAR — the signature element.
           A small reactive "core" with an orbiting ring instead of a
           static icon. States: idle (slow breathing), thinking (ring
           spins + core throbs), speaking (waveform bars replace eyes).
           ============================================================ */
        .friend-avatar-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .avatar-orbit {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: var(--bond-color);
            border-right-color: var(--agent-pulse);
            opacity: 0.55;
            animation: orbit-spin 3.6s linear infinite;
            transition: border-top-color 0.6s ease;
        }

        /* The friendship "heartbeat" — a soft double-thump glow behind the
           face. Speed and warmth are driven by --heartbeat-speed and
           --bond-color, both nudged by updateTrustScore() as the Symbiosis
           score changes, so the bond is something you can feel, not just read. */
        .friend-avatar-container::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--bond-color) 0%, transparent 70%);
            opacity: 0;
            animation: heartbeat var(--heartbeat-speed) ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes heartbeat {
            0%   { opacity: 0.35; transform: scale(0.85); }
            14%  { opacity: 0.05; transform: scale(1.05); }
            28%  { opacity: 0.30; transform: scale(0.9); }
            42%  { opacity: 0;    transform: scale(1); }
            100% { opacity: 0;    transform: scale(1); }
        }

        @keyframes orbit-spin {
            to { transform: rotate(360deg); }
        }

        .robot-face {
            width: 20px;
            height: 16px;
            background: #201a26;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 3px;
            box-sizing: border-box;
            border: 1px solid var(--bond-color);
            box-shadow: 0 0 8px rgba(155, 89, 182, 0.35), inset 0 0 6px rgba(155, 89, 182, 0.15);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            animation: face-breathe 3.4s ease-in-out infinite;
        }

        @keyframes face-breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-0.5px) scale(1.03); }
        }

        .robot-face.speaking {
            border-color: var(--agent-pulse);
            box-shadow: 0 0 12px rgba(255, 46, 136, 0.55);
            animation: face-talk 0.42s ease-in-out infinite alternate;
        }

        @keyframes face-talk {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.08); }
        }

        .robot-face.thinking {
            border-color: var(--agent-core);
            box-shadow: 0 0 12px rgba(155, 89, 182, 0.6);
            animation: brain-throb 1.1s infinite ease-in-out;
        }

        .robot-face.error { border-color: var(--error-fg); box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .robot-face.success {
            border-color: var(--success-fg);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
            animation: face-cheer 0.5s ease-in-out 2;
        }

        @keyframes face-cheer {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-2.5px) rotate(-6deg); }
            75% { transform: translateY(-2.5px) rotate(6deg); }
        }

        @keyframes brain-throb {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .robot-eye {
            width: 3px;
            height: 3px;
            background: var(--agent-calm);
            border-radius: 50%;
            box-shadow: 0 0 4px var(--agent-calm);
            animation: eye-blink 4.6s infinite;
        }

        /* Two eyes blink slightly out of sync — a small imperfection that
           reads as "alive" rather than a mechanical, synchronized flicker. */
        .robot-eye:nth-child(2) { animation-duration: 5.3s; animation-delay: 0.6s; }

        .robot-face.thinking .robot-eye {
            background: var(--agent-core);
            box-shadow: 0 0 5px var(--agent-core);
            animation: eye-scan 1.1s ease-in-out infinite;
        }

        .robot-face.speaking .robot-eye {
            background: var(--agent-pulse);
            box-shadow: 0 0 5px var(--agent-pulse);
        }

        .robot-face.success .robot-eye {
            background: var(--agent-warm);
            box-shadow: 0 0 6px var(--agent-warm);
        }

        @keyframes eye-scan {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-1.5px); opacity: 0.5; }
        }

        /* A gently curved smile instead of a flat line — the single
           friendliest change on the whole face. */
        .robot-mouth {
            position: absolute;
            bottom: 2.5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 4px;
            background: transparent !important;
            border: none;
            border-bottom: 1.5px solid var(--agent-calm);
            border-radius: 0 0 8px 8px;
            transition: all 0.2s ease;
        }

        .robot-face.speaking .robot-mouth {
            border-bottom-color: var(--agent-pulse);
            border-radius: 4px;
            animation: mouth-flap 0.28s ease-in-out infinite alternate;
        }

        .robot-face.success .robot-mouth {
            border-bottom-color: var(--agent-warm);
            width: 10px;
            height: 5px;
        }

        @keyframes mouth-flap {
            from { height: 3px; width: 7px; border-radius: 4px; }
            to { height: 4px; width: 4px; border-radius: 50%; }
        }

        @keyframes eye-blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }

        /* A little cheer — like a friend's quick smile of approval — when a
           patch lands or a review is accepted. Toggled briefly by JS. */
        .friend-avatar-container.celebrate::after,
        .mini-face.celebrate::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid var(--agent-warm);
            opacity: 0;
            animation: spark-ring 0.7s ease-out;
            pointer-events: none;
        }

        @keyframes spark-ring {
            0% { transform: scale(0.6); opacity: 0.9; border-color: var(--agent-warm); }
            60% { border-color: var(--agent-warm-2); }
            100% { transform: scale(1.7); opacity: 0; }
        }

        /* ============================================================
           SYMBIOSIS METER — animated shimmering gradient bar
           ============================================================ */
        .affective-matrix {
            margin: 0 16px 10px 16px;
            padding: 9px 12px;
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.06), rgba(255, 46, 136, 0.03));
            border: 1px solid var(--code-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }

        .matrix-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
            color: var(--agent-core);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        #matrix-score-val {
            color: var(--vscode-descriptionForeground);
            font-weight: 700;
        }

        .matrix-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
            position: relative;
        }

        .matrix-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--agent-calm), var(--agent-core) 55%, var(--agent-pulse));
            background-size: 200% 100%;
            width: 75%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            animation: shimmer-flow 3.5s linear infinite;
        }

        @keyframes shimmer-flow {
            0% { background-position: 0% 0%; }
            100% { background-position: -200% 0%; }
        }

        /* ============================================================
           SCRATCHPAD (HUD)
           ============================================================ */
        .friendship-hud {
            margin: 0 16px 12px 16px;
            border: 1px solid var(--code-border);
            border-radius: 8px;
            background: rgba(155, 89, 182, 0.03);
            overflow: hidden;
            flex-shrink: 0;
        }

        .hud-header {
            padding: 7px 12px;
            font-size: 11px;
            font-weight: bold;
            color: var(--agent-core);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(155, 89, 182, 0.06);
            border-bottom: 1px solid var(--code-border);
            cursor: pointer;
            user-select: none;
            list-style: none;
        }

        .hud-header::-webkit-details-marker { display: none; }
        .hud-header::marker { display: none; content: ''; }

        .hud-header::after {
            content: '\eab4';
            font-family: 'codicon';
            font-size: 12px;
            opacity: 0.7;
            transition: transform 0.2s ease;
        }

        .friendship-hud details:not([open]) .hud-header::after { transform: rotate(-90deg); }

        .hud-scroll-container {
            padding: 10px 14px;
            font-size: 11px;
            max-height: 120px;
            overflow-y: auto;
            color: var(--vscode-descriptionForeground);
            line-height: 1.5;
        }

        /* ============================================================
           COGNITIVE MODE TOGGLE
           ============================================================ */
        .cognitive-toolbar {
            display: flex;
            gap: 6px;
            margin: 0 16px 10px 16px;
            background: rgba(0, 0, 0, 0.22);
            padding: 3px;
            border-radius: 20px;
            border: 1px solid var(--code-border);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .cognitive-pill {
            flex: 1;
            padding: 6px;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 18px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--vscode-foreground);
            user-select: none;
        }

        .cognitive-pill:hover { opacity: 0.9; background: rgba(255, 255, 255, 0.05); }

        .cognitive-pill.active {
            opacity: 1;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            transform: scale(1.03);
        }

        #pill-grounding.active { background: linear-gradient(135deg, var(--agent-calm), #0891b2) !important; color: #06222a !important; }

        #pill-move37.active {
            background: linear-gradient(135deg, var(--agent-core), var(--agent-pulse)) !important;
            color: white !important;
            box-shadow: 0 0 10px rgba(155, 89, 182, 0.5);
            animation: move37-pulse 1.4s infinite alternate;
        }

        @keyframes move37-pulse {
            from { box-shadow: 0 0 10px rgba(155, 89, 182, 0.4), 0 0 20px rgba(255, 46, 136, 0.2); }
            to { box-shadow: 0 0 16px rgba(155, 89, 182, 0.85), 0 0 32px rgba(255, 46, 136, 0.45); }
        }

        /* ============================================================
           INPUT AREA
           ============================================================ */
        .input-area-wrapper {
            padding: 12px 16px 16px 16px;
            background-color: var(--vscode-sideBar-background);
            border-top: 1px solid var(--vscode-panel-border);
            position: relative;
            z-index: 6000;
            overflow: visible !important;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            background-color: var(--vscode-input-background);
            border: 1px solid var(--vscode-input-border);
            border-radius: 14px;
            padding: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-area:focus-within {
            border-color: var(--agent-core);
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.15);
        }

        .input-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; }

        .attachment-preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid var(--vscode-widget-border);
            margin-bottom: 8px;
        }

        .attachment-preview-area:empty { display: none; }

        .staged-image-card {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid var(--vscode-widget-border);
            background-size: cover;
            background-position: center;
            background-color: var(--vscode-editor-background);
        }

        .control-buttons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

        .control-buttons button {
            background: transparent;
            border: none;
            color: var(--vscode-icon-foreground);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
        }

        .control-buttons button:hover { background: var(--vscode-toolbar-hoverBackground); color: var(--vscode-foreground); }

        #send-btn {
            background: linear-gradient(135deg, var(--agent-core), var(--agent-pulse)) !important;
            color: white !important;
        }
        #send-btn:hover { transform: scale(1.08) rotate(6deg); }
        #send-btn:disabled { opacity: 0.5; transform: none; }

        textarea {
            flex: 1;
            height: 48px;
            resize: none;
            background-color: transparent;
            color: var(--vscode-input-foreground);
            border: none;
            outline: none;
            font-family: var(--vscode-font-family);
            font-size: 13px;
            box-sizing: border-box;
            padding: 4px;
        }

        /* ============================================================
           SURGICAL REVIEW CARDS
           ============================================================ */
        .review-card {
            margin: 15px 0;
            border: 1.5px solid var(--vscode-focusBorder);
            border-radius: 10px;
            background: var(--vscode-editorWidget-background);
            overflow: hidden;
            box-shadow: var(--shadow-lift);
            display: flex;
            flex-direction: column;
            animation: popCard 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popCard {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .review-header {
            background: var(--vscode-sideBarSectionHeader-background);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: bold;
            color: var(--vscode-textLink-foreground);
            border-bottom: 1px solid var(--vscode-widget-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .review-body { padding: 12px 15px; font-size: 12px; line-height: 1.5; display: flex; align-items: center; gap: 8px; }

        .review-actions-row {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid var(--vscode-widget-border);
            background: rgba(0, 0, 0, 0.15);
        }

        .review-btn-accept { background: var(--vscode-charts-green) !important; color: white !important; flex: 1; justify-content: center; height: 28px; }
        .review-btn-reject { background: var(--vscode-charts-red) !important; color: white !important; flex: 1; justify-content: center; height: 28px; }

        .spinner {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--vscode-textLink-foreground);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ============================================================
           LAYOUT SHELL
           ============================================================ */
        .main { display: flex; flex-direction: column; height: 100vh; width: 100%; box-sizing: border-box; position: relative; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background-color: var(--vscode-sideBarSectionHeader-background);
            border-bottom: 1px solid var(--vscode-widget-border);
            flex-shrink: 0;
            height: 48px;
            box-sizing: border-box;
        }

        .header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }

        .title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .actions { display: flex; gap: 6px; flex-shrink: 0; }

        button {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: 1px solid transparent;
            padding: 4px 10px;
            font-family: var(--vscode-font-family);
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 24px;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        button:hover { background-color: var(--vscode-button-hoverBackground); }
        button.secondary { background-color: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground); }
        button.secondary:hover { background-color: var(--vscode-button-secondaryHoverBackground); }
        button.danger { background-color: transparent; border: 1px solid var(--vscode-errorForeground); color: var(--vscode-errorForeground); }
        button.danger:hover { background-color: var(--vscode-errorForeground); color: #ffffff; }
        button:focus { outline: 1px solid var(--vscode-focusBorder); outline-offset: 1px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .integrity-badge {
            font-size: 10px;
            padding: 3px 9px;
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background-color: var(--vscode-sideBar-background);
            border-right: 1px solid var(--vscode-widget-border);
            z-index: 10000;
            transform: translateX(-100%);
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: var(--shadow-lift);
        }

        .sidebar.visible { transform: translateX(0); }

        .sidebar-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: none;
        }

        .sidebar-overlay.visible { display: block; }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--vscode-widget-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--vscode-sideBarSectionHeader-background);
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .history-list { flex: 1; overflow-y: auto; padding: 8px 0; }

        .history-item {
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-bottom: 1px solid var(--vscode-widget-border);
            transition: background-color 0.1s ease;
        }

        .history-item:hover { background-color: var(--vscode-list-hoverBackground); }

        .history-prompt { font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-actions { display: flex; justify-content: space-between; align-items: center; font-size: 11px; opacity: 0.7; }
        .history-time { font-size: 10px; }

        .history-item .delete-btn { background: transparent; border: none; padding: 0 4px; color: var(--vscode-errorForeground); font-size: 14px; cursor: pointer; height: auto; }
        .history-item .delete-btn:hover { color: var(--vscode-errorForeground); }

        /* ============================================================
           CHAT STREAM — real discussion layout: bubbles alternate
           sides, each assistant turn carries its own mini avatar.
           ============================================================ */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            max-width: 260px;
            color: var(--vscode-descriptionForeground);
        }

        .empty-state-face {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .empty-state-face .mini-face {
            width: 44px;
            height: 44px;
            background: rgba(155, 89, 182, 0.12);
            border: 1px solid var(--bond-color);
            transform-origin: 70% 100%;
            animation: friendly-wave 2.2s ease-in-out infinite;
        }

        .empty-state-face .robot-face { width: 24px; height: 19px; }
        .empty-state-face .robot-eye { width: 3.5px; height: 3.5px; }

        @keyframes friendly-wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(-8deg); }
            20% { transform: rotate(6deg); }
            30% { transform: rotate(-8deg); }
            40% { transform: rotate(6deg); }
            50% { transform: rotate(0deg); }
        }

        .empty-state h3 {
            color: var(--vscode-foreground);
            font-size: 14px;
            margin: 0 0 6px 0;
        }

        .empty-state p {
            font-size: 12px;
            line-height: 1.5;
            margin: 0;
        }

        .message-wrapper {
            width: 100%;
            padding: 6px 0;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: bubbleIn 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user-msg-wrapper { justify-content: flex-end; }
        .message-wrapper.assistant-msg-wrapper { justify-content: flex-start; }

        .msg-avatar-slot { flex-shrink: 0; width: 26px; height: 26px; margin-bottom: 2px; }
        .msg-avatar-slot .mini-face {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(155, 89, 182, 0.12);
            border: 1px solid var(--agent-core);
            position: relative;
        }
        .msg-avatar-slot .mini-face .robot-face { width: 15px; height: 12px; }
        .msg-avatar-slot .mini-face .robot-eye { width: 2px; height: 2px; }

        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 82%;
            padding: 10px 13px;
            border-radius: var(--bubble-radius);
            box-sizing: border-box;
            box-shadow: var(--shadow-soft);
            position: relative;
        }

        .user-message {
            background: linear-gradient(135deg, var(--user-accent), #2456b8);
            color: #f5f8ff;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .assistant-message {
            background-color: var(--vscode-editor-background);
            border: 1px solid var(--vscode-widget-border);
            border-left: 3px solid var(--bond-color);
            border-bottom-left-radius: 4px;
            transition: border-left-color 0.6s ease;
        }

        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10.5px;
            font-weight: bold;
            opacity: 0.75;
            gap: 8px;
        }

        .message-header .msg-label { display: flex; align-items: center; gap: 5px; }
        .user-message .message-header { color: rgba(255, 255, 255, 0.85); }
        .assistant-message .message-header { color: var(--agent-core); }

        .message-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s ease; }
        .message-wrapper:hover .message-actions { opacity: 0.85; }

        .msg-action-btn {
            background: rgba(0, 0, 0, 0.25) !important;
            border: none !important;
            width: 20px; height: 20px; padding: 0 !important;
            border-radius: 50% !important;
            color: inherit !important;
        }
        .msg-action-btn:hover { background: rgba(0, 0, 0, 0.45) !important; }

        .message-content {
            font-size: 13px;
            line-height: 1.5;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* Typing / thinking indicator bubble shown before first chunk arrives */
        .typing-bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 2px;
        }
        .typing-bubble .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--agent-core);
            opacity: 0.5;
            animation: dot-bounce 1.1s ease-in-out infinite;
        }
        .typing-bubble .dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ============================================================
           CODE COLLAPSIBLE GRAPHICAL ENHANCEMENTS
           ============================================================ */
        .code-collapsible {
            background-color: var(--vscode-editor-background);
            border: 1px solid var(--vscode-widget-border);
            border-radius: 8px;
            margin: 12px 0;
            overflow: visible !important;
            width: 100%;
        }

        .code-summary {
            display: flex !important;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background-color: var(--vscode-keybindingTable-headerBackground);
            color: var(--vscode-foreground);
            font-size: 12px;
            user-select: none;
            border-bottom: 1px solid var(--vscode-widget-border);
            box-sizing: border-box;
            list-style: none;
            margin: 0;
            border-top-left-radius: 7px;
            border-top-right-radius: 7px;
            cursor: pointer;
        }

        .code-summary::-webkit-details-marker { display: none !important; }
        .code-summary::marker { display: none !important; content: "" !important; }

        .code-summary::before {
            content: '\25BC';
            font-size: 10px;
            margin-right: 10px;
            color: var(--vscode-icon-foreground);
            display: inline-block;
            transition: transform 0.2s;
        }

        details:not([open]) > .code-summary::before { transform: rotate(-90deg); }

        .summary-lang-label { font-weight: 800; display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }

        .code-actions { display: flex; gap: 6px; align-items: center; }

        .code-action-btn {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 24px;
        }

        .code-action-btn:hover { background-color: var(--vscode-button-secondaryHoverBackground); }
        .code-action-btn.apply-btn { background-color: var(--vscode-button-background); color: var(--vscode-button-foreground); }
        .code-action-btn.apply-btn:hover { background-color: var(--vscode-button-hoverBackground); }
        .code-action-btn.applied { background-color: var(--vscode-charts-green) !important; color: white !important; }

        .code-collapsible > pre {
            margin: 0;
            padding: 0;
            max-height: 400px;
            overflow: auto;
            display: flex;
            flex-direction: row;
            width: 100%;
            background-color: var(--vscode-editor-background);
            box-sizing: border-box;
        }

        .code-line-gutter {
            flex-shrink: 0;
            width: 40px;
            text-align: right;
            padding: 12px 8px;
            color: var(--vscode-editor-lineNumbers-foreground);
            background-color: var(--vscode-editorGutter-background);
            user-select: none;
            font-family: var(--vscode-editor-font-family);
            font-size: var(--vscode-editor-font-size);
            border-right: 1px solid var(--vscode-editorGroup-border);
            line-height: 1.5;
            position: sticky;
            left: 0;
            z-index: 10;
            align-self: flex-start;
        }

        .code-collapsible > pre > code {
            flex: 1;
            display: block;
            padding: 12px;
            font-family: var(--vscode-editor-font-family);
            font-size: var(--vscode-editor-font-size);
            white-space: pre;
            background-color: transparent;
            box-sizing: border-box;
            line-height: 1.5;
            min-width: 0;
        }

        .plan-scratchpad {
            border-left: 3px solid var(--agent-core);
            background: rgba(155, 89, 182, 0.04);
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .scratchpad-header {
            padding: 6px 12px;
            font-weight: bold;
            color: var(--agent-core);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }

        .scratchpad-content { padding: 10px 15px; font-size: 11px; opacity: 0.9; background: rgba(0, 0, 0, 0.05); }

        .edit-overlay { display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" onclick="toggleHistory()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>History</span>
            <div>
                <button class="clear-btn" onclick="clearHistory()" title="Clear All" style="display:inline;">Clear</button>
                <button class="close-sidebar-btn" onclick="toggleHistory()" title="Close">✕</button>
            </div>
        </div>
        <div class="history-list" id="history-list"></div>
    </div>
    <div class="main">
        <div class="header">
            <div class="header-left">
                <button class="secondary" onclick="toggleHistory()" title="Show History">
                    <span class="codicon codicon-history"></span>
                </button>
                <div class="friend-avatar-container" title="Lollms - Your best pair-programming companion">
                    <div class="avatar-orbit"></div>
                    <div class="robot-face" id="friend-face">
                        <div class="robot-eye"></div>
                        <div class="robot-eye"></div>
                        <div class="robot-mouth"></div>
                    </div>
                </div>
                <span class="title">Lollms Companion</span>
                <div class="integrity-badge" title="Operates with zero telemetry, protecting your IP.">
                    <span class="codicon codicon-shield"></span> Zero-Telemetry
                </div>
            </div>
            <div class="actions" style="display:flex; gap:8px;">
                <button class="secondary danger" onclick="clearResponse()" title="Wipe Memory (Start Over)"><span class="codicon codicon-trash"></span> Wipe</button>
                <button class="secondary" onclick="copyFullResponse()" title="Copy Markdown"><span class="codicon codicon-copy"></span></button>
            </div>
        </div>

        <div class="affective-matrix">
            <div class="matrix-header">
                <span>Symbiosis State: <span id="matrix-label-text">Symbiotic</span></span>
                <span id="matrix-score-val">75%</span>
            </div>
            <div class="matrix-bar">
                <div class="matrix-bar-fill" id="matrix-bar-fill"></div>
            </div>
        </div>

        <div class="friendship-hud">
            <details open>
                <summary class="hud-header">
                    <span><i class="codicon codicon-chip"></i> Friendship Scratchpad (Short Term Memory)</span>
                </summary>
                <div class="hud-scroll-container" id="hud-scratchpad-body">
                    Standing by. Ready to pair-program with you!
                </div>
            </details>
        </div>

        <div class="content" id="markdown-content"></div>
        <div class="input-area-wrapper">
            <div class="input-area-container">
                <div class="cognitive-toolbar" style="display: flex; gap: 6px; margin: 0 16px 10px 16px; justify-content: center;">
                    <div class="cognitive-pill active" id="pill-standard" onclick="setCognitiveMode('standard')">
                        <span class="codicon codicon-workspace-trusted"></span> Focused Co-Pilot
                    </div>
                    <div class="cognitive-pill" id="pill-grounding" onclick="setCognitiveMode('grounding')">
                        <span class="codicon codicon-layers"></span> Grounding Mode
                    </div>
                    <div class="cognitive-pill" id="pill-move37" onclick="setCognitiveMode('move37')">
                        <span class="codicon codicon-sparkle"></span> Move 37
                    </div>
                </div>
                <div class="input-area">
                    <div class="context-info" style="margin-bottom: 8px; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--vscode-descriptionForeground);">
                        <span class="codicon codicon-target"></span>
                        <span id="context-info-text">Syncing...</span>
                    </div>
                    <div class="rich-input-toolbar" style="border: none; border-radius: 0; background: transparent; padding: 2px 0; margin-bottom: 8px; border-bottom: 1px solid var(--vscode-widget-border);">
                        <button class="toolbar-tool" onclick="wrapText('python')" title="Python Block"><i class="codicon codicon-symbol-method"></i><span>Python</span></button>
                        <button class="toolbar-tool" onclick="wrapText('code')" title="Code Block"><i class="codicon codicon-code"></i><span>Code</span></button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-tool" onclick="wrapText('h1')" title="Heading 1"><span>H1</span></button>
                        <button class="toolbar-tool" onclick="wrapText('h2')" title="Heading 2"><span>H2</span></button>
                        <button class="toolbar-tool" onclick="wrapText('h3')" title="Heading 3"><span>H3</span></button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-tool" onclick="wrapText('list')" title="Bullet List"><i class="codicon codicon-list-unordered"></i></button>
                        <button class="toolbar-tool" onclick="wrapText('bold')" title="Bold"><i class="codicon codicon-bold"></i></button>
                        <button class="toolbar-tool" onclick="wrapText('italic')" title="Italic"><i class="codicon codicon-italic"></i></button>
                    </div>
                    <div class="input-row">
                        <div class="control-buttons">
                            <button id="moreActionsButton" title="Menu" onclick="toggleHistory()"><i class="codicon codicon-menu"></i></button>
                        </div>
                        <textarea id="prompt-input" placeholder="Ask a question or request a change..."></textarea>
                        <div class="control-buttons">
                            <button onclick="submitPrompt()" id="send-btn" title="Send Message"><i class="codicon codicon-send"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script {{nonce}}>
        const vscode = acquireVsCodeApi();
        const container = document.getElementById('markdown-content');
        const promptInput = document.getElementById('prompt-input');

        let activeContentBuffer = "";
        let activePrompt = "";
        let activeMood = 'idle';
        let activeMode = 'standard';
        let isMove37Active = false;

        // Small inline SVG-free "mini face" markup reused for every assistant bubble avatar.
        function miniFaceHtml(mood) {
            mood = mood || 'idle';
            return '<div class="mini-face"><div class="robot-face ' + mood + '">' +
                   '<div class="robot-eye"></div><div class="robot-eye"></div><div class="robot-mouth"></div>' +
                   '</div></div>';
        }

        function submitPrompt() {
            const text = promptInput.value.trim();
            if (text) {
                vscode.postMessage({
                    command: 'submitPrompt',
                    text: text,
                    mode: activeMode
                });
                promptInput.value = '';
                promptInput.style.height = 'auto';
            }
        }

        if (promptInput) {
            promptInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitPrompt();
                }
            });
        }

        function clearResponse() {
            activeContentBuffer = "";
            activePrompt = "";
            if (container) container.innerHTML = "";
            _respAssistantEl = null;
            _respPromptRendered = null;
            _chatHistorySig = null;
            _chatStreamingEl = null;
            const scratchpad = document.getElementById('hud-scratchpad-body');
            if (scratchpad) scratchpad.textContent = 'Standing by. Ready to pair-program with you!';
            vscode.postMessage({ command: 'clearActiveChat' });
        }

        function toggleAttach() {
            vscode.postMessage({ command: 'toggleAttach' });
        }

        function setMood(mood) {
            setFaceMood(mood);
        }

        function setFaceMood(mood) {
            activeMood = mood;
            const face = document.getElementById('friend-face');
            if (face) {
                face.className = 'robot-face ' + mood;
            }
            // Reflect the same mood on every avatar currently in the stream.
            document.querySelectorAll('.msg-avatar-slot .robot-face').forEach(f => {
                f.className = 'robot-face ' + mood;
            });

            if (mood === 'success') {
                celebrate();
            }
        }

        // A quick warm ring-pulse on every visible avatar — a friend's smile
        // of approval when a patch lands, rather than a silent status change.
        function celebrate() {
            document.querySelectorAll('.friend-avatar-container, .msg-avatar-slot .mini-face').forEach(el => {
                el.classList.remove('celebrate');
                // Force reflow so the animation can replay if triggered twice in a row.
                void el.offsetWidth;
                el.classList.add('celebrate');
                setTimeout(() => el.classList.remove('celebrate'), 750);
            });
        }

        // Drives the Symbiosis meter AND the avatar's heartbeat: as the score
        // climbs, the bond literally beats faster and warms from violet toward
        // amber. Low trust reads cool and calm; deep trust reads warm and quick.
        function updateTrustScore(score) {
            const pct = Math.max(0, Math.min(100, Number(score) || 0));

            const fill = document.getElementById('matrix-bar-fill');
            if (fill) fill.style.width = pct + '%';

            const scoreVal = document.getElementById('matrix-score-val');
            if (scoreVal) scoreVal.textContent = Math.round(pct) + '%';

            const labelEl = document.getElementById('matrix-label-text');
            let label = 'Building Trust';
            let bondColor = 'var(--agent-core)';
            if (pct >= 90) { label = 'Inseparable'; bondColor = 'var(--agent-warm-2)'; }
            else if (pct >= 70) { label = 'Symbiotic'; bondColor = 'var(--agent-warm)'; }
            else if (pct >= 40) { label = 'Aligned'; bondColor = 'var(--agent-core)'; }
            else { label = 'Building Trust'; bondColor = 'var(--agent-calm)'; }
            if (labelEl) labelEl.textContent = label;

            // Heartbeat speeds up from ~2.6s (distant) to ~1.1s (close) as trust grows.
            const speed = (2.6 - (pct / 100) * 1.5).toFixed(2) + 's';
            document.documentElement.style.setProperty('--heartbeat-speed', speed);
            document.documentElement.style.setProperty('--bond-color', bondColor);
        }

        function buildMessageDOM(role, id) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ' + (role === 'user' ? 'user-msg-wrapper' : 'assistant-msg-wrapper');
            wrapper.dataset.messageId = id;

            const avatarSlot = document.createElement('div');
            avatarSlot.className = 'msg-avatar-slot';
            avatarSlot.innerHTML = role === 'user'
                ? '<div class="mini-face" style="background:rgba(59,130,246,0.15); border-color: var(--user-accent);"><i class="codicon codicon-account" style="font-size:13px; color: var(--user-accent);"></i></div>'
                : miniFaceHtml('idle');

            const message = document.createElement('div');
            message.className = 'message ' + (role === 'user' ? 'user-message' : 'assistant-message');

            const header = document.createElement('div');
            header.className = 'message-header';
            const label = document.createElement('span');
            label.className = 'msg-label';
            label.innerHTML = role === 'user'
                ? '<span class="codicon codicon-account"></span><span>You</span>'
                : '<span class="codicon codicon-sparkle"></span><span>Lollms</span>';
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            actions.innerHTML = '<button class="msg-action-btn edit-msg-btn" onclick="event.stopPropagation(); startEdit(this.closest(\'.message-wrapper\'), \'' + id + '\', \'' + role + '\')"><i class="codicon codicon-edit"></i></button>';
            header.appendChild(label);
            header.appendChild(actions);

            const body = document.createElement('div');
            body.className = role === 'user' ? 'message-content' : 'markdown-body message-content';

            message.appendChild(header);
            message.appendChild(body);

            if (role === 'user') {
                wrapper.appendChild(message);
                wrapper.appendChild(avatarSlot);
            } else {
                wrapper.appendChild(avatarSlot);
                wrapper.appendChild(message);
            }

            return { wrapper: wrapper, body: body };
        }

        // Tracks what's currently on screen so renderChat/renderResponse can patch
        // the DOM in place instead of wiping and rebuilding it on every streamed
        // chunk (a full teardown was the cause of the visible "blink").
        let _chatHistorySig = null;
        let _chatStreamingEl = null;

        function renderChat(history, streamingText) {
            if (!container) return;

            // Only rebuild the finished history bubbles when the history itself
            // actually changed. Streaming chunks don't touch `history`, so this
            // skip is what stops every token from re-rendering the whole thread.
            const historySig = JSON.stringify((history || []).map(m => [m.role, m.content.length]));
            if (historySig !== _chatHistorySig) {
                container.innerHTML = "";
                _chatStreamingEl = null;
                renderHistoryBubbles(history);
                _chatHistorySig = historySig;
            }

            renderStreamingBubble(streamingText);
            container.scrollTop = container.scrollHeight;
        }

        function renderHistoryBubbles(history) {
            // Render all previous history bubbles
            (history || []).forEach((msg, idx) => {
                if (msg.role === 'user') {
                    renderUserBubble(msg.content, 'user_' + idx);
                } else if (msg.role === 'assistant') {
                    const dom = buildMessageDOM('assistant', 'assistant_companion_msg_' + idx);
                    const responseBody = dom.body;

                    const parsed = processThinkTags(msg.content);
                    let thoughtsHtml = "";
                    if (parsed.thoughts.length > 0) {
                        parsed.thoughts.forEach((t, tIdx) => {
                            const isClosed = t.closed || true;
                            const iconHtml = isClosed ? '<span class="codicon codicon-circuit-board"></span>' : '<span class="codicon codicon-sync spin" style="color:var(--agent-core);"></span>';
                            thoughtsHtml += `<div class="plan-scratchpad" data-idx="${tIdx}">

                                '</div>' +
                            '</div>';
                        }).join('');

                    break;
                case 'applyAllResult':
                    const card = document.getElementById(message.blockId);
                    if (card) {

                            const headerActions = card.querySelector('.generation-header .code-actions');

                                    setMood('success');

                        }
                    }
                    break;
            }

        function processThinkTags(content) {
            const thoughts = [];
            if (typeof content !== 'string') return { thoughts: thoughts, processedContent: '' };
            const openTags = ['<think>', '<thinking>', '<analysis>', '<reasoning>'];
            const closeTags = ['</think>', '</thinking>', '</analysis>', '</reasoning>'];

            const protectedRanges = [];
            const fenceRegex = /`{3,}[\s\S]*?(?:`{3,}|$)|`[^`\n\r]+`/g;
            let fMatch;
            while ((fMatch = fenceRegex.exec(content)) !== null) {
                protectedRanges.push({ start: fMatch.index, end: fMatch.index + fMatch[0].length });
            }

            const isProtected = (index) => {
                return protectedRanges.some(r => index >= r.start && index < r.end);
            };

            let processedContent = '';
            let remaining = content;
            let currentOffset = 0;

            while (remaining.length > 0) {
                let firstOpenIdx = -1;
                let activeOpenTag = '';
                for (let i = 0; i < openTags.length; i++) {
                    const tag = openTags[i];
                    const idx = remaining.indexOf(tag);
                    if (idx !== -1 && !isProtected(currentOffset + idx)) {
                        if (firstOpenIdx === -1 || idx < firstOpenIdx) {
                            firstOpenIdx = idx;
                            activeOpenTag = tag;
                        }
                    }
                }
                if (firstOpenIdx === -1) {
                    processedContent += remaining;
                    break;
                }
                processedContent += remaining.substring(0, firstOpenIdx);
                const activeCloseTag = activeOpenTag.replace('<', '</');
                const searchStartIdx = firstOpenIdx + activeOpenTag.length;
                let closeIdx = remaining.indexOf(activeCloseTag, searchStartIdx);
                while (closeIdx !== -1 && isProtected(currentOffset + closeIdx)) {
                    closeIdx = remaining.indexOf(activeCloseTag, closeIdx + 1);
                }
                if (closeIdx === -1) {
                    const thoughtContent = remaining.substring(searchStartIdx);
                    thoughts.push({
                        tag: activeOpenTag.replace(/[<>]/g, ''),
                        content: thoughtContent.trim(),
                        closed: false
                    });
                    break;
                }
                const thoughtContent = remaining.substring(searchStartIdx, closeIdx);
                thoughts.push({
                    tag: activeOpenTag.replace(/[<>]/g, ''),
                    content: thoughtContent.trim(),
                    closed: true
                });
                const nextOffset = closeIdx + activeCloseTag.length;
                currentOffset += nextOffset;
                remaining = remaining.substring(nextOffset);
            }
            return { thoughts: thoughts, processedContent: processedContent.trim() };
        }

        function startEdit(wrapper, id, role) {
            let originalContent = "";
            try {
                originalContent = JSON.parse(wrapper.dataset.originalContent || '""');
            } catch {
                originalContent = "";
            }

            const body = wrapper.querySelector('.message-content');
            const actions = wrapper.querySelector('.message-actions');
            if (!body || !actions) return;

            const editOverlay = document.createElement('div');
            editOverlay.className = 'edit-overlay';

            const textarea = document.createElement('textarea');
            textarea.className = 'edit-textarea';
            textarea.style.cssText = "width:100%; height:80px; background:var(--vscode-input-background); color:var(--vscode-input-foreground); border:1px solid var(--vscode-input-border); border-radius:6px; padding:6px; box-sizing:border-box;";
            textarea.value = typeof originalContent === 'string' ? originalContent : JSON.stringify(originalContent);

            const buttons = document.createElement('div');
            buttons.className = 'edit-buttons';
            buttons.style.cssText = "display:flex; justify-content:flex-end; gap:8px; margin-top:8px;";

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'edit-cancel-btn secondary';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = (e) => {
                e.stopPropagation();
                editOverlay.remove();
                actions.style.display = 'flex';
                if (role === 'user') {
                    body.textContent = originalContent;
                } else {
                    renderResponse(originalContent, activePrompt, true);
                }
            };

            const saveBtn = document.createElement('button');
            saveBtn.className = 'edit-save-btn';
            saveBtn.textContent = 'Save';
            saveBtn.onclick = (e) => {
                e.stopPropagation();
                const newVal = textarea.value.trim();
                if (newVal) {
                    vscode.postMessage({
                        command: 'updateMessage',
                        messageId: id,
                        newContent: newVal
                    });
                }
                editOverlay.remove();
                actions.style.display = 'flex';
            };

            buttons.append(cancelBtn, saveBtn);
            editOverlay.append(textarea, buttons);

            body.innerHTML = '';
            body.appendChild(editOverlay);
            actions.style.display = 'none';
            textarea.focus();
        }

        function enhanceCodeBlocks(container, messageId, contentSource, isFinal = false) {
            const pres = container.querySelectorAll('pre');
            pres.forEach((pre, index) => {
                const code = pre.querySelector('code');
                if (!code || pre.parentElement?.classList.contains('code-collapsible')) return;

                const langMatch = code.className.match(/language-(\S+)/);
                let language = langMatch ? langMatch[1] : 'plaintext';
                let filePath = '';

                if (language.includes(':')) {
                    const parts = language.split(':');
                    language = parts[0];
                    filePath = parts.slice(1).join(':').trim();
                }

                const codeText = code.innerText;
                const isAider = codeText.includes('<<<<<<< SEARCH') && codeText.includes('>>>>>>> REPLACE');

                const details = document.createElement('details');
                details.className = 'code-collapsible';
                details.open = true;
                details.id = 'block-comp-' + messageId + '-' + index;

                const summary = document.createElement('summary');
                summary.className = 'code-summary';

                const label = document.createElement('div');
                label.className = 'summary-lang-label';
                label.innerHTML = '<span class="lang-badge">' + language + '</span>' + (filePath ? ' : <span class="path-display-label">' + filePath + '</span>' : '');
                summary.appendChild(label);

                const actions = document.createElement('div');
                actions.className = 'code-actions';
                summary.appendChild(actions);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'code-action-btn';
                copyBtn.innerHTML = '<span class="codicon codicon-copy"></span>';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    vscode.postMessage({ command: 'copyToClipboard', text: codeText });
                };
                actions.appendChild(copyBtn);

                if (filePath) {
                    const applyBtn = document.createElement('button');
                    applyBtn.className = 'code-action-btn apply-btn';
                    applyBtn.innerHTML = '<span class="codicon ' + (isAider ? 'codicon-arrow-swap' : 'codicon-tools') + '"></span>';
                    applyBtn.onclick = (e) => {
                        e.stopPropagation();
                        const cmd = isAider ? 'replaceCode' : 'applyFileContent';
                        vscode.postMessage({
                            command: cmd,
                            filePath: filePath,
                            content: codeText,
                            options: { silent: false, blockId: details.id, hunkIndex: index }
                        });
                    };
                    actions.appendChild(applyBtn);
                }

                details.appendChild(summary);
                pre.replaceWith(details);
                details.appendChild(pre);

                if (typeof Prism !== 'undefined') {
                    Prism.highlightElement(code);
                }
            });
        }

        // Sync the avatar's heartbeat speed/color with the Symbiosis value
        // already shown in the markup, so the very first frame is consistent.
        updateTrustScore(75);

        // Global Exports for DOM actions
        window.toggleHistory = toggleHistory;
        window.toggleAttach = toggleAttach;
        window.clearHistory = () => vscode.postMessage({ command: 'clearHistory' });
        window.submitPrompt = submitPrompt;
        window.setCognitiveMode = setCognitiveMode;
        window.copyFullResponse = () => vscode.postMessage({ command: 'copyToClipboard', text: activeContentBuffer });
        window.clearResponse = clearResponse;
        window.startEdit = startEdit;
        window.enhanceCodeBlocks = enhanceCodeBlocks;
        window.loadHistory = (id) => {
            vscode.postMessage({ command: 'loadHistory', id: id });
            toggleHistory();
        };
        window.deleteHistory = (e, id) => {
            e.stopPropagation();
            vscode.postMessage({ command: 'deleteHistory', id: id });
        };
    </script>
</body>
</html>
